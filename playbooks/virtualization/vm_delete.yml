---
- name: Netbox API call
  hosts: all
  connection: local
  gather_facts: no
  
  # Not needed here because it's imported using requirements file
  # collections:
  #   - netbox.netbox

  # Needs to ingest/replace vars from/with values from vault
  # vars:
  #   - app_url: ""
  #   - app_token: ""

  tasks:
    - name: Message about what you need to do
      ansible.builtin.debug:
        msg: "I need to delete {{ server_fqdn | split('.') | first }} from Netbox"

    - name: Delete vm from Netbox
      netbox.netbox.netbox_virtual_machine:
        netbox_url: "{{ netbox_url }}"
        netbox_token: "{{ netbox_token }}"
        data:
          name: "{{ server_fqdn | split('.') | first }}"
        state: absent
        validate_certs: no
      register: netbox_delete_output

    - name: Message about what you did
      ansible.builtin.debug:
        msg: "{{ netbox_delete_output }}"
